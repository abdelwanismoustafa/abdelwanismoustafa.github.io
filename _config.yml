# Replace every instance of "your-github-username" with your real GitHub username.
# If this is a project site instead of a user site, set baseurl to "/repo-name"
# and change repository accordingly.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default" # try "default" if you prefer a softer look
title                    : "Moustafa Abdelwanis"
title_separator          : "-"
name                     : &name "Moustafa Abdelwanis"
description              : &description "Ph.D. Candidate in Engineering Systems and Management at Khalifa University. Research in operations management, AI in healthcare, human-AI interaction, simulation, and optimization."
url                      : https://your-github-username.github.io
baseurl                  : ""
repository               : "your-github-username/your-github-username.github.io"

# Site Author
author:
  avatar           : "profile.png" # place in /images/
  name             : "Moustafa Abdelwanis"
  pronouns         :
  bio              : "Ph.D. candidate in Engineering Systems and Management working on operations management, AI in healthcare, human-AI interaction, simulation, and optimization."
  location         : "Abu Dhabi, United Arab Emirates"
  employer         : "Khalifa University"
  uri              :
  email            : "moustafa.abdelwanis@ku.ac.ae"

  # Academic websites
  academia         :
  arxiv            :
  googlescholar    : "https://scholar.google.com/citations?hl=en&user=VwCuh7MAAAAJ"
  inspire-hep      :
  impactstory      :
  orcid            : "https://orcid.org/my-orcid?orcid=0000-0001-5034-2613"
  semantic         :
  ssrn             :
  pubmed           :
  researchgate     : "https://www.researchgate.net/profile/Moustafa-Abdelwanis?ev=hdr_xprf"
  scopus           :
  zotero           :

  # Repositories and software development
  bitbucket        :
  codepen          :
  dribbble         :
  github           :
  kaggle           :
  stackoverflow    :

  # Social media
  artstation       :
  bluesky          :
  facebook         :
  flickr           :
  foursquare       :
  goodreads        :
  google_plus      :
  keybase          :
  instagram        :
  lastfm           :
  linkedin         :
  mastodon         :
  medium           :
  pinterest        :
  soundcloud       :
  steam            :
  telegram         :
  tumblr           :
  twitter          :
  vine             :
  weibo            :
  wikipedia        :
  xing             :
  youtube          :
  zhihu            :

# Publication categories shown on the publications page
publication_category:
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"
  preprints:
    title: "Preprints"
  theses:
    title: "Theses"

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 180
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               : false
  disqus:
    shortname            :
  discourse:
    server               :
  facebook:
    appid                :
    num_posts            :
    colorscheme          :
staticman:
  allowedFields          : ['name', 'email', 'url', 'message']
  branch                 : "gh-pages"
  commitMessage          : "New comment."
  filename               : comment-{@timestamp}
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ['name', 'email', 'message']
  transforms:
    email                : "md5"
  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601"
atom_feed:
  hide                   : false
  path                   :

# SEO
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

# Social Sharing
twitter:
  username               : &twitter
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 : "profile.png"
og_description           : *description
social:
  type                   : Person
  name                   : "Moustafa Abdelwanis"
  links:
    - "https://scholar.google.com/citations?hl=en&user=VwCuh7MAAAAJ"

# Analytics
analytics:
  provider               : false
  google:
    tracking_id          :

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: false
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Asia/Dubai

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Mimic GitHub Pages with --safe
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
